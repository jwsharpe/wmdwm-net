<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>formie</title>
    <style>
      :root {
        --bg: #0b0d14;
        --text: #e6e2d8;
        --muted: #7a8090;
        --line: #1a1e2a;
        --photo-border: 0.5rem;
        --mat: #f3efe6;
        --meta: #c4a87c;
        --footer-h: 3rem;
        --photo-v-pad: 3rem;
        --edge-x: 1rem;
        --next-btn-size: 1.5rem;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, sans-serif;
        line-height: 1.4;
      }

      button {
        font: inherit;
        font-size: 0.7rem;
        line-height: 1.3;
        padding: 0;
        cursor: pointer;
        background: none;
        border: none;
        color: var(--text);
        flex-shrink: 0;
      }

      button:hover:not(:disabled) {
        color: var(--muted);
      }

      button:disabled {
        opacity: 0.4;
        cursor: default;
      }

      #next-btn {
        position: fixed;
        right: var(--edge-x);
        bottom: calc((var(--footer-h) - var(--next-btn-size)) / 2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: var(--next-btn-size);
        height: var(--next-btn-size);
        border-radius: 50%;
        background: var(--mat);
        color: #2a2520;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
        transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        z-index: 1;
      }

      #next-btn:hover:not(:disabled) {
        background: var(--meta);
        color: var(--mat);
        box-shadow: 0 1px 8px rgba(0, 0, 0, 0.45);
      }

      #next-btn svg {
        display: block;
        width: 0.575rem;
        height: 0.575rem;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        min-height: 0;
      }

      .frame {
        width: fit-content;
        max-width: 100%;
      }

      .photo-mat {
        padding: var(--photo-border);
        background: var(--mat);
        line-height: 0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      }

      .photo-slot {
        position: relative;
        line-height: 0;
      }

      .photo-placeholder {
        --placeholder: #f3efe6;
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 3 / 2;
        width: 3.5rem;
        background: var(--placeholder);
      }

      .spinner {
        width: 1rem;
        height: 1rem;
        border: 2px solid #c0b3a7;
        border-top-color: var(--placeholder);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .photo-slot.loaded .photo-placeholder {
        display: none;
      }

      #photo {
        display: block;
        max-width: min(70rem, calc(100vw - 2rem - var(--photo-border) * 2));
        max-height: calc(
          100vh - var(--footer-h) - 2rem - var(--photo-border) * 2 - var(--photo-v-pad)
        );
        width: auto;
        height: auto;
        opacity: 0;
      }

      .photo-slot:not(.loaded) #photo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        max-width: none;
        max-height: none;
        object-fit: contain;
      }

      .photo-slot.loaded #photo {
        opacity: 1;
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        min-height: var(--footer-h);
        padding: 0 calc(var(--edge-x) + var(--next-btn-size) + 0.75rem) 0 var(--edge-x);
        flex-shrink: 0;
      }

      .meta {
        margin: 0;
        font-size: 0.7rem;
        color: color-mix(in srgb, var(--meta) 85%, transparent);
        line-height: 1.3;
      }

      .status {
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
        max-width: 22rem;
      }

      .status.error {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="status" id="status" hidden></p>
      <div class="frame" id="viewer">
        <div class="photo-mat">
          <div class="photo-slot" id="photo-slot">
            <div class="photo-placeholder" aria-hidden="true">
              <div class="spinner"></div>
            </div>
            <img id="photo" alt="" referrerpolicy="no-referrer" />
          </div>
        </div>
      </div>
    </main>
    <footer id="footer">
      <p class="meta" id="meta"></p>
      <button type="button" id="next-btn" disabled aria-label="Next">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 3l5 5-5 5" />
        </svg>
      </button>
    </footer>

    <script>
      const statusEl = document.getElementById("status");
      const viewerEl = document.getElementById("viewer");
      const footerEl = document.getElementById("footer");
      const photoEl = document.getElementById("photo");
      const photoSlotEl = document.getElementById("photo-slot");
      const metaEl = document.getElementById("meta");
      const nextBtn = document.getElementById("next-btn");

      const PRELOAD_COUNT = 2;
      const RECENT_COUNT = 20;

      /** @type {{ u: string, width: number|null, height: number|null, takenAt: number|null, id: string }[]} */
      let photos = [];
      /** @type {{ photo: object, img: HTMLImageElement }[]} */
      let preloaded = [];
      /** @type {string[]} */
      let recentIds = [];
      /** @type {string|null} */
      let currentId = null;

      function photoSrc(photo) {
        return `./api/image?p=${encodeURIComponent(photo.u)}&w=1600`;
      }

      function excludedIds() {
        const ids = new Set(recentIds);
        if (currentId) ids.add(currentId);
        for (const entry of preloaded) ids.add(entry.photo.id);
        return ids;
      }

      function pickPhoto() {
        if (photos.length === 0) return null;

        const exclude = excludedIds();
        const pool = photos.filter((p) => !exclude.has(p.id));
        const choices = pool.length > 0 ? pool : photos;
        const idx = Math.floor(Math.random() * choices.length);
        return choices[idx];
      }

      function preloadPhoto(photo) {
        const img = new Image();
        img.referrerPolicy = "no-referrer";
        img.src = photoSrc(photo);
        return { photo, img };
      }

      function fillPreload() {
        while (preloaded.length < PRELOAD_COUNT && photos.length > 0) {
          const photo = pickPhoto();
          if (!photo) break;
          preloaded.push(preloadPhoto(photo));
        }
      }

      const takenAtFormatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short",
      });

      function formatTakenAt(photo) {
        if (!photo.takenAt) return "";
        return takenAtFormatter.format(new Date(photo.takenAt));
      }

      function setPhotoLoaded(loaded) {
        photoSlotEl.classList.toggle("loaded", loaded);
      }

      function showPhoto(photo, cachedImg) {
        currentId = photo.id;
        recentIds.push(photo.id);
        if (recentIds.length > RECENT_COUNT) recentIds.shift();
        setPhotoLoaded(false);
        metaEl.textContent = formatTakenAt(photo);

        if (cachedImg?.complete && cachedImg.naturalWidth > 0) {
          photoEl.src = cachedImg.src;
          setPhotoLoaded(true);
        } else {
          photoEl.src = photoSrc(photo);
        }

        fillPreload();
      }

      photoEl.addEventListener("load", () => {
        setPhotoLoaded(true);
      });

      photoEl.addEventListener("error", () => {
        statusEl.textContent = "Could not load this image.";
        statusEl.classList.add("error");
        statusEl.hidden = false;
        viewerEl.hidden = true;
        footerEl.hidden = true;
      });

      nextBtn.addEventListener("click", () => {
        const cached = preloaded.shift();
        if (cached) {
          showPhoto(cached.photo, cached.img);
          return;
        }
        const photo = pickPhoto();
        if (photo) showPhoto(photo);
      });

      async function loadAlbum(token) {
        const res = await fetch(`./api/album?p=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data.photos ?? [];
      }

      async function init() {
        try {
          // const res = await fetch("./data/albums.json");
          const res = await fetch("./formie/data/albums.json");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const albums = await res.json();
          if (!Array.isArray(albums) || albums.length === 0) {
            throw new Error("Add album tokens to data/albums.json");
          }

          const batches = await Promise.all(
            albums.filter((token) => typeof token === "string" && token.trim()).map(loadAlbum),
          );
          photos = batches.flat();
          if (photos.length === 0) throw new Error("No photos found in albums");

          nextBtn.disabled = false;
          const first = pickPhoto();
          if (first) showPhoto(first);
        } catch (err) {
          statusEl.textContent = err.message;
          statusEl.classList.add("error");
          statusEl.hidden = false;
          viewerEl.hidden = true;
          footerEl.hidden = true;
        }
      }

      init();
    </script>
  </body>
</html>
